<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHEQ-OK · Familia Inversora</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    --azul-profundo: #003163;
    --azul-profundo-oscuro: #001f42;
    --azul-medio: #277ac0;
    --azul-claro: #5a9bd5;
    --azul-muy-claro: #e8f1fa;
    --crema: #fdfcfa;
    --crema-oscuro: #f5f2ec;
    --blanco: #ffffff;
    --tinta: #1a1a1a;
    --tinta-dim: #555b66;
    --tinta-faint: #8a8f98;
    --linea: #e4ddd0;
    --linea-fuerte: #c8c0b0;
    --verde: #2d7a3e;
    --verde-bg: #e8f3ea;
    --verde-borde: #a8d0b1;
    --rojo: #b0302e;
    --rojo-bg: #f7e8e8;
    --rojo-borde: #d99592;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--crema);
    color: var(--tinta);
    min-height: 100vh;
    line-height: 1.55;
  }
  .topbar {
    background: var(--blanco);
    border-bottom: 1px solid var(--linea);
    padding: 18px 0;
  }
  .topbar-inner {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo-wrap { display: flex; align-items: center; gap: 14px; }
  .logo-img { height: 44px; width: auto; display: block; }
  .topbar-meta {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--tinta-faint);
    font-weight: 600;
  }
  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }
  .hero {
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--linea);
  }
  .eyebrow {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--azul-medio);

    margin-bottom: 14px;
    padding: 5px 10px;
    background: var(--azul-muy-claro);
    border-radius: 2px;
  }
  h1.titulo {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: 52px;
    letter-spacing: -0.015em;
    color: var(--azul-profundo);
    line-height: 1.05;
    margin-bottom: 18px;
  }
  h1.titulo em {
    font-style: italic;
    font-weight: 500;
    color: var(--azul-medio);
  }
  .lead {
    color: var(--tinta-dim);
    font-size: 16px;
    max-width: 620px;
    line-height: 1.7;
  }
  .panel {
    background: var(--blanco);
    border: 1px solid var(--linea);
    border-radius: 6px;
    padding: 32px;
    margin-bottom: 20px;
    box-shadow: 0 1px 3px rgba(0, 49, 99, 0.04);
  }
  .panel-title {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--tinta-faint);
    margin-bottom: 18px;
    font-weight: 700;
  }
  .form-row { display: flex; gap: 12px; align-items: stretch; }
  input[type="text"] {
    flex: 1;
    background: var(--crema);
    border: 1px solid var(--linea-fuerte);
    color: var(--tinta);
    padding: 15px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.02em;
    border-radius: 4px;
    outline: none;
    transition: all 0.15s;
  }
  input[type="text"]:focus {
    border-color: var(--azul-medio);
    background: var(--blanco);
    box-shadow: 0 0 0 3px rgba(39, 122, 192, 0.15);
  }
  button.btn-primary {
    background: var(--azul-profundo);
    color: var(--blanco);
    border: none;
    padding: 0 32px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  button.btn-primary:hover:not(:disabled) {
    background: var(--azul-medio);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(0, 49, 99, 0.2);
  }
  button.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .ejemplos {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 18px;
    align-items: center;
  }
  .ejemplos-label {
    color: var(--tinta-faint);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    margin-right: 4px;
  }
  .ejemplos code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--crema);
    padding: 6px 12px;
    border-radius: 3px;
    color: var(--azul-profundo);
    cursor: pointer;
    border: 1px solid var(--linea);
    transition: all 0.15s;
    font-weight: 500;
  }
  .ejemplos code:hover {
    color: var(--azul-medio);
    border-color: var(--azul-medio);
    background: var(--azul-muy-claro);
  }
  details.config {
    background: var(--blanco);
    border: 1px solid var(--linea);
    border-radius: 6px;
    margin-bottom: 20px;
    box-shadow: 0 1px 3px rgba(0, 49, 99, 0.04);
  }
  details.config summary {
    padding: 18px 28px;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--tinta-dim);
    font-weight: 700;
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  details.config summary::-webkit-details-marker { display: none; }
  details.config summary::after {
    content: "+";
    font-size: 20px;
    color: var(--azul-medio);
    font-weight: 400;
  }
  details.config[open] summary::after { content: "−"; }
  .config-body {
    padding: 0 28px 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .config-field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--tinta-faint);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .config-field input { width: 100%; }
  .resultado { margin-top: 28px; }
  .semaforo {
    padding: 36px;
    border-radius: 6px;
    border: 1px solid;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .semaforo::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
  }
  .semaforo.verde { background: var(--verde-bg); border-color: var(--verde-borde); }
  .semaforo.verde::before { background: var(--verde); }
  .semaforo.rojo { background: var(--rojo-bg); border-color: var(--rojo-borde); }
  .semaforo.rojo::before { background: var(--rojo); }
  .semaforo-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }
  .semaforo-luz {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .semaforo.verde .semaforo-luz {
    background: radial-gradient(circle at 30% 30%, #5aa568, var(--verde));
    box-shadow: 0 0 0 4px rgba(45, 122, 62, 0.15), 0 4px 16px rgba(45, 122, 62, 0.3);
  }
  .semaforo.rojo .semaforo-luz {
    background: radial-gradient(circle at 30% 30%, #d05a57, var(--rojo));
    box-shadow: 0 0 0 4px rgba(176, 48, 46, 0.15), 0 4px 16px rgba(176, 48, 46, 0.3);
  }
  .semaforo-titulo {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.015em;
    line-height: 1.1;
  }
  .semaforo.rojo .semaforo-titulo { color: var(--rojo); }
  .semaforo.verde .semaforo-titulo { color: var(--verde); }
  .semaforo-sub {
    color: var(--tinta-dim);
    font-size: 13px;
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }
  .denominacion {
    font-size: 14px;
    color: var(--azul-profundo);
    margin-top: 4px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .semaforo-mensaje {
    font-size: 15px;
    line-height: 1.65;
    padding-top: 18px;
    border-top: 1px solid rgba(0, 49, 99, 0.1);
    color: var(--tinta);
  }
  .section-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--tinta-faint);
    margin: 32px 0 14px;
    font-weight: 700;
  }
  .motivos { list-style: none; }
  .motivo {
    background: var(--blanco);
    border: 1px solid var(--linea);
    border-left: 3px solid var(--linea);
    padding: 16px 20px;
    margin-bottom: 10px;
    border-radius: 3px;
    font-size: 14px;
    line-height: 1.55;
    color: var(--tinta);
  }
  .motivo.rojo { border-left-color: var(--rojo); }
  .motivo.amarillo { border-left-color: #d89838; }
  .motivo.info { border-left-color: var(--azul-medio); color: var(--tinta-dim); }
